databases:
  - name: ssdi-db
    plan: free
    databaseName: ssdi_app
    user: ssdi_user

services:
  - type: web
    name: ssdi-app
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app2:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ssdi-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.6"
