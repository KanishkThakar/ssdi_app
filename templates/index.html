<!DOCTYPE html>
<html>
<head>
    <title>Soul Yatri - Naive Bayes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-5">
    <h1 class="mb-4">Naive Bayes Classification</h1>
    <div class="card p-4 shadow-sm">
        <form id="ml-form">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Upload Data (CSV)</label>
                    <input type="file" name="file" class="form-control">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Target Column</label>
                    <select name="target" class="form-select">
                        {% for col in columns %}<option>{{ col }}</option>{% endfor %}
                    </select>
                </div>
            </div>
            <button type="submit" class="btn btn-dark w-100">Run Model</button>
        </form>
    </div>

    <div id="results" class="mt-5" style="display:none;">
        <div class="row text-center">
            <div class="col-md-6">
                <h3>Accuracy: <span id="acc-text" class="text-success"></span></h3>
                <img id="res-plot" class="img-fluid rounded border mt-3" src="">
            </div>
            <div class="col-md-6">
                <h5>Classification Report</h5>
                <pre id="res-report" class="bg-light p-3 border text-start"></pre>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('ml-form').onsubmit = async (e) => {
            e.preventDefault();
            const res = await fetch('/', { method: 'POST', body: new FormData(e.target) });
            const data = await res.json();
            if(data.error) return alert(data.error);
            document.getElementById('results').style.display = 'block';
            document.getElementById('acc-text').innerText = data.accuracy;
            document.getElementById('res-plot').src = "data:image/png;base64," + data.plot;
            document.getElementById('res-report').innerText = data.report;
        };
    </script>
</body>
</html>
