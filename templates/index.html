<!DOCTYPE html>
<html>
<head>
    <title>Naive Bayes Flask App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <h2>Naive Bayes Classification</h2>
    <form id="upload-form" enctype="multipart/form-data">
        <div class="mb-3">
            <label>Upload CSV (Optional, defaults to Credit.csv)</label>
            <input type="file" name="file" class="form-control">
        </div>
        <div class="mb-3">
            <label>Target Column</label>
            <select name="target" class="form-control">
                {% for col in columns %}<option value="{{col}}">{{col}}</option>{% endfor %}
            </select>
        </div>
        <div class="mb-3">
            <label>Features (Hold Ctrl to select multiple)</label>
            <select name="features" class="form-control" multiple>
                {% for col in columns %}<option value="{{col}}" selected>{{col}}</option>{% endfor %}
            </select>
        </div>
        <button type="submit" class="btn btn-primary">Train Model</button>
    </form>

    <div id="results" class="mt-5" style="display:none;">
        <h3>Accuracy: <span id="acc-val"></span></h3>
        <img id="cm-plot" class="img-fluid" src="" />
        <h4>Report:</h4>
        <pre id="report-val" class="bg-light p-3"></pre>
    </div>

    <script>
        document.getElementById('upload-form').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const response = await fetch('/', { method: 'POST', body: formData });
            const data = await response.json();
            
            if(data.error) alert(data.error);
            else {
                document.getElementById('results').style.display = 'block';
                document.getElementById('acc-val').innerText = data.accuracy;
                document.getElementById('cm-plot').src = "data:image/png;base64," + data.plot;
                document.getElementById('report-val').innerText = data.report;
            }
        };
    </script>
</body>
</html>
